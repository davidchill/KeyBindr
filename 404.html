<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | KeyBindr</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="preload" href="/fonts/chakra-petch-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/chakra-petch-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .err-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 24px;
    }

    .err-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .err-brand .brand-name {
      font-size: 1.4rem;
    }

    .err-code {
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -6px;
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .err-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .err-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .err-link {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: var(--accent);
      color: #000;
      border-radius: var(--r);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    .err-link:hover { opacity: 0.82; }
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-brand">
      <img class="brand-icon" src="logos/main_nobackground.png" alt="KeyBindr logo">
      <span class="brand-name">KeyBindr</span>
    </div>

    <div class="err-code">404</div>
    <p class="err-title">Key not found</p>
    <p class="err-sub">Looks like you've wandered into unmapped territory.</p>
    <a class="err-link" href="/">Back to KeyBindr</a>
  </div>
</body>
</html>
