<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyBindr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="5" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
        <rect x="10" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
        <rect x="15" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
        <rect x="5" y="13" width="13" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
      </svg>
      <span class="brand-name">KeyBindr</span>
    </div>

    <div class="header-actions">
      <div class="theme-picker" id="theme-picker" role="group" aria-label="Color theme">
        <button class="theme-btn" data-theme-val="light" title="Light mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="system" title="System default">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="dark" title="Dark mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <button id="btn-share" class="btn btn-secondary">Share</button>
      <button id="btn-print" class="btn btn-secondary">Print</button>
      <button id="btn-export" class="btn btn-secondary">Export JSON</button>
      <button id="btn-import" class="btn btn-secondary">Import JSON</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
  </header>

  <div class="layout-bar">
    <button id="btn-new" class="btn btn-ghost">New</button>
    <div class="map-name-wrapper" title="Click to rename your map">
      <input type="text" id="map-name" class="map-name-input" placeholder="Map name…" autocomplete="off" spellcheck="false" value="My Keyboard Map">
      <svg class="map-name-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>
    <button id="btn-save" class="btn btn-ghost">Save</button>
    <div class="undo-redo-group">
      <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Shift+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
      </button>
    </div>
    <button id="btn-clear-all" class="btn btn-ghost">Clear All</button>
    <button id="btn-heatmap" class="btn btn-ghost">Heat Map</button>
    <div class="layout-bar-divider"></div>
    <button id="btn-templates" class="btn btn-secondary">Templates</button>
    <div class="layout-bar-divider"></div>
    <div class="layout-group">
      <label class="layout-label" for="select-layout">Form factor</label>
      <select class="layout-select" id="select-layout">
        <optgroup label="Standard">
          <option value="full">Full (104-key)</option>
          <option value="tkl">Tenkeyless (TKL)</option>
          <option value="60">60%</option>
          <option value="split">Split</option>
        </optgroup>
        <optgroup label="Split Ergonomic">
          <option value="voyager">ZSA Voyager</option>
          <option value="moonlander">ZSA Moonlander</option>
          <option value="ergodox">ErgoDox EZ</option>
        </optgroup>
      </select>
    </div>
    <div class="layout-group">
      <label class="layout-label" for="select-keymap">Key map</label>
      <select class="layout-select" id="select-keymap">
        <option value="qwerty">QWERTY</option>
        <option value="dvorak">Dvorak</option>
        <option value="colemak">Colemak</option>
        <option value="azerty">AZERTY</option>
        <option value="qwertz">QWERTZ</option>
      </select>
    </div>
  </div>

  <main class="app-main">
    <div class="legend-section">
      <div class="legend">
        <div class="legend-title-row">
          <span class="legend-title">Categories</span>
          <button id="btn-add-cat" class="icon-btn" title="Add category">+</button>
        </div>
        <div id="new-category-form" class="new-cat-form hidden">
          <input type="text" id="new-cat-name" class="new-cat-name-input" placeholder="Name…" maxlength="30" autocomplete="off">
          <input type="color" id="new-cat-color" class="new-cat-color-input" value="#6366f1">
          <button id="btn-new-cat-add" class="btn btn-primary">Add</button>
          <button id="btn-new-cat-cancel" class="icon-btn">✕</button>
        </div>
        <div id="category-list" class="category-list"></div>
        <span id="stat-assigned" class="legend-stat">0 keys assigned</span>
      </div>
    </div>

    <div class="keyboard-section">
      <div class="keyboard-scroll">
        <div id="keyboard" class="keyboard"></div>
      </div>
    </div>

    <div class="summary-section">
      <div class="summary-card">
        <div class="summary-header-row">
          <span class="legend-title">Hotkey Summary</span>
          <input id="summary-search" class="summary-search" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
          <div class="summary-actions">
            <button id="btn-copy-text" class="btn btn-ghost btn-sm">Copy Text</button>
            <button id="btn-copy-md" class="btn btn-ghost btn-sm">Copy Markdown</button>
          </div>
        </div>
        <p id="summary-empty" class="summary-empty">No hotkeys assigned yet — click any key to get started.</p>
        <div id="summary-grid" class="summary-grid"></div>
      </div>
    </div>
  </main>

  <!-- Template overlay + modal -->
  <div id="template-overlay" class="popover-overlay hidden"></div>
  <div id="template-modal" class="template-modal hidden" role="dialog" aria-modal="true" aria-label="Load a Template">
    <div class="template-modal-header">
      <span class="template-modal-title">Load a Template</span>
      <button id="template-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div class="template-tabs">
      <button class="template-tab active" data-cat="all">All</button>
      <button class="template-tab" data-cat="Design">Design</button>
      <button class="template-tab" data-cat="Video">Video</button>
      <button class="template-tab" data-cat="Gaming">Gaming</button>
      <button class="template-tab" data-cat="Development">Development</button>
    </div>
    <div id="template-grid" class="template-grid"></div>
  </div>

  <!-- Popover overlay -->
  <div id="popover-overlay" class="popover-overlay hidden"></div>

  <!-- Edit popover -->
  <div id="popover" class="popover hidden" role="dialog" aria-modal="true" aria-labelledby="popover-title">
    <div class="popover-header">
      <div class="popover-key-info">
        <kbd id="popover-key-badge" class="key-badge"></kbd>
        <span id="popover-title" class="popover-key-name"></span>
      </div>
      <button id="popover-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div class="popover-body">
      <div class="form-group">
        <span class="form-label">Modifiers</span>
        <div class="mod-group" id="mod-group">
          <label class="mod-chip"><input type="checkbox" value="Ctrl"><span>Ctrl</span></label>
          <label class="mod-chip"><input type="checkbox" value="Alt"><span>Alt</span></label>
          <label class="mod-chip"><input type="checkbox" value="Shift"><span>Shift</span></label>
          <label class="mod-chip"><input type="checkbox" value="Win"><span>⊞ Win</span></label>
        </div>
      </div>
      <div class="form-group label-autocomplete-group">
        <label class="form-label" for="hotkey-label">Action Label</label>
        <input id="hotkey-label" type="text" class="form-input" placeholder="e.g. Undo, Save, Jump" maxlength="40" autocomplete="off">
        <div id="label-suggestions" class="label-suggestions" hidden></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="hotkey-desc">Description <span class="form-optional">(optional)</span></label>
        <textarea id="hotkey-desc" class="form-input form-textarea" placeholder="What does this do?" rows="2" maxlength="140"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="hotkey-category">Category</label>
        <select id="hotkey-category" class="form-input form-select"></select>
      </div>
      <div id="conflict-warning" class="conflict-warning" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="conflict-warning-text"></span>
      </div>
      <div class="popover-footer">
        <button id="btn-save-hotkey" class="btn btn-primary">Save</button>
        <button id="btn-clear-hotkey" class="btn btn-danger">Clear Key</button>
      </div>
    </div>
  </div>

  <!-- Coming soon overlay -->
  <div id="coming-soon" class="coming-soon">
    <div class="cs-card">
      <div class="cs-brand">
        <svg class="cs-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <rect x="5" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
          <rect x="10" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
          <rect x="15" y="8" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
          <rect x="5" y="13" width="13" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
        </svg>
        <span class="cs-brand-name">KeyBindr</span>
      </div>
      <h1 class="cs-headline">Coming Soon</h1>
      <p class="cs-tagline">A visual keyboard shortcut builder,<br>crafted for power users.</p>
    </div>
  </div>

  <div id="key-tooltip" class="key-tooltip" hidden>
    <div class="kt-label"></div>
    <div class="kt-mods"></div>
    <div class="kt-desc"></div>
    <div class="kt-cat"></div>
  </div>

  <script src="templates.js"></script>
  <script src="app.js"></script>
</body>
</html>
