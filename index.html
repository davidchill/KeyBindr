<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyBindr - Visual Keyboard Shortcut Mapper. Map your muscle memory.</title>
  <meta name="description" content="Map and visualize your keyboard shortcuts with KeyBindr. Click any key to assign hotkeys, color-code by category, and export or share your layout. Supports full, TKL, 60%, and split ergonomic keyboards.">
  <meta name="keywords" content="keyboard shortcut mapper, hotkey visualizer, keyboard layout tool, shortcut reference, key mapping, keyboard diagram, hotkey map">
  <meta name="author" content="KeyBindr">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://keybindr.app/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://keybindr.app/">
  <meta property="og:site_name" content="KeyBindr">
  <meta property="og:title" content="KeyBindr - Visual Keyboard Shortcut Mapper. Map your muscle memory.">
  <meta property="og:description" content="Map and visualize your keyboard shortcuts with KeyBindr. Click any key to assign hotkeys, color-code by category, and export or share your layout.">
  <meta property="og:image" content="https://keybindr.app/og-image.png">
  <meta property="og:image:alt" content="KeyBindr keyboard shortcut mapper">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="KeyBindr - Visual Keyboard Shortcut Mapper. Map your muscle memory.">
  <meta name="twitter:description" content="Map and visualize your keyboard shortcuts with KeyBindr. Click any key to assign hotkeys, color-code by category, and export or share your layout.">
  <meta name="twitter:image" content="https://keybindr.app/og-image.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "KeyBindr",
    "url": "https://keybindr.app/",
    "description": "An interactive browser-based tool for mapping and visualizing keyboard shortcuts. Assign hotkeys to any key, color-code by category, and export or share your layout.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "Interactive keyboard visualization",
      "Hotkey assignment with color categories",
      "Full, TKL, 60%, and split ergonomic layouts",
      "Export and import JSON maps",
      "Shareable URLs"
    ]
  }
  </script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y1EQFTC8YR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y1EQFTC8YR');
  </script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <img class="brand-icon" src="logos/main_nobackground.png" alt="KeyBindr" aria-hidden="true">
      <span class="brand-name">KeyBindr</span>
      <span class="brand-tagline">Map your muscle memory</span>
    </div>

    <button id="btn-mobile-menu" class="icon-btn mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="header-actions">
      <select id="scheme-picker" class="scheme-select" aria-label="Color scheme">
        <option value="default">Default</option>
        <option value="synthwave">Synthwave</option>
        <option value="phosphor">Phosphor</option>
        <option value="crimson">Crimson</option>
        <option value="forge">Forge</option>
      </select>
      <div class="theme-picker" id="theme-picker" role="group" aria-label="Color theme">
        <button class="theme-btn" data-theme-val="light" title="Light mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="system" title="System default">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="dark" title="Dark mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <button id="btn-share" class="btn btn-secondary">Share</button>
      <button id="btn-print" class="btn btn-secondary">Print</button>
      <button id="btn-export" class="btn btn-secondary">Export JSON</button>
      <button id="btn-import" class="btn btn-secondary">Import JSON</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
  </header>

  <div class="layout-bar">
    <button id="btn-new" class="btn btn-ghost">New</button>
    <div class="map-name-wrapper" title="Click to rename your map">
      <input type="text" id="map-name" class="map-name-input" placeholder="Map name…" autocomplete="off" spellcheck="false" value="My Keyboard Map">
      <svg class="map-name-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>
    <button id="btn-save" class="btn btn-ghost">Save</button>
    <div class="undo-redo-group">
      <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Shift+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
      </button>
    </div>
    <button id="btn-clear-all" class="btn btn-ghost">Clear All</button>
    <button id="btn-heatmap" class="btn btn-ghost">Heat Map</button>
    <div class="layout-bar-divider"></div>
    <button id="btn-templates" class="btn btn-secondary">Templates</button>
    <div class="layout-bar-divider"></div>
    <div class="layout-group">
      <label class="layout-label" for="select-layout">Form factor</label>
      <select class="layout-select" id="select-layout">
        <optgroup label="Standard">
          <option value="full">Full (104-key)</option>
          <option value="tkl">Tenkeyless (TKL)</option>
          <option value="60">60%</option>
          <option value="split">Split</option>
        </optgroup>
        <optgroup label="Split Ergonomic">
          <option value="voyager">ZSA Voyager</option>
          <option value="moonlander">ZSA Moonlander</option>
          <option value="ergodox">ErgoDox EZ</option>
        </optgroup>
      </select>
    </div>
    <div class="layout-group">
      <label class="layout-label" for="select-keymap">Key map</label>
      <select class="layout-select" id="select-keymap">
        <option value="qwerty">QWERTY</option>
        <option value="dvorak">Dvorak</option>
        <option value="colemak">Colemak</option>
        <option value="azerty">AZERTY</option>
        <option value="qwertz">QWERTZ</option>
      </select>
    </div>
  </div>

  <main class="app-main">
    <div class="legend-section">
      <div class="legend" id="legend">
        <div class="legend-header">
          <div class="legend-title-row">
            <span class="legend-title">Categories</span>
            <button id="btn-add-cat" class="icon-btn" title="Add category">+</button>
          </div>
          <span id="stat-assigned" class="legend-stat">0 keys assigned</span>
          <button id="btn-legend-toggle" class="icon-btn legend-toggle" title="Toggle categories" aria-expanded="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div class="legend-active-preview" id="legend-active-preview"></div>
        <div class="legend-body">
          <div class="legend-body-inner">
            <div id="new-category-form" class="new-cat-form hidden">
              <input type="text" id="new-cat-name" class="new-cat-name-input" placeholder="Name…" maxlength="30" autocomplete="off">
              <input type="color" id="new-cat-color" class="new-cat-color-input" value="#6366f1">
              <button id="btn-new-cat-add" class="btn btn-primary">Add</button>
              <button id="btn-new-cat-cancel" class="icon-btn">✕</button>
            </div>
            <div id="category-list" class="category-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="keyboard-section">
      <div class="keyboard-scroll">
        <div id="keyboard" class="keyboard"></div>
      </div>
    </div>

    <div class="summary-section">
      <div class="summary-card">
        <div class="summary-header-row">
          <span class="legend-title">Hotkey Summary</span>
          <input id="summary-search" class="summary-search" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
          <div class="summary-actions">
            <button id="btn-copy-text" class="btn btn-ghost btn-sm">Copy Text</button>
            <button id="btn-copy-md" class="btn btn-ghost btn-sm">Copy Markdown</button>
          </div>
        </div>
        <p id="summary-empty" class="summary-empty">No hotkeys assigned yet — click any key to get started.</p>
        <div id="summary-grid" class="summary-grid"></div>
      </div>
    </div>
  </main>

  <!-- Template overlay + modal -->
  <div id="template-overlay" class="popover-overlay hidden"></div>
  <div id="template-modal" class="template-modal hidden" role="dialog" aria-modal="true" aria-label="Load a Template">
    <div class="template-modal-header">
      <span class="template-modal-title">Load a Template</span>
      <button id="template-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div class="template-tabs">
      <button class="template-tab active" data-cat="all">All</button>
      <button class="template-tab" data-cat="Design">Design</button>
      <button class="template-tab" data-cat="Video">Video</button>
      <button class="template-tab" data-cat="Gaming">Gaming</button>
      <button class="template-tab" data-cat="Development">Development</button>
    </div>
    <div id="template-grid" class="template-grid"></div>
  </div>

  <!-- Popover overlay -->
  <div id="popover-overlay" class="popover-overlay hidden"></div>

  <!-- Edit popover -->
  <div id="popover" class="popover hidden" role="dialog" aria-modal="true" aria-labelledby="popover-title">
    <div class="popover-header">
      <div class="popover-key-info">
        <kbd id="popover-key-badge" class="key-badge"></kbd>
        <span id="popover-title" class="popover-key-name"></span>
      </div>
      <button id="popover-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div class="popover-body">
      <div class="form-group">
        <span class="form-label">Modifiers</span>
        <div class="mod-group" id="mod-group">
          <label class="mod-chip"><input type="checkbox" value="Ctrl"><span>Ctrl</span></label>
          <label class="mod-chip"><input type="checkbox" value="Alt"><span>Alt</span></label>
          <label class="mod-chip"><input type="checkbox" value="Shift"><span>Shift</span></label>
          <label class="mod-chip"><input type="checkbox" value="Win"><span>⊞ Win</span></label>
        </div>
      </div>
      <div class="form-group label-autocomplete-group">
        <label class="form-label" for="hotkey-label">Action Label</label>
        <input id="hotkey-label" type="text" class="form-input" placeholder="e.g. Undo, Save, Jump" maxlength="40" autocomplete="off">
        <div id="label-suggestions" class="label-suggestions" hidden></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="hotkey-desc">Description <span class="form-optional">(optional)</span></label>
        <textarea id="hotkey-desc" class="form-input form-textarea" placeholder="What does this do?" rows="2" maxlength="140"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="hotkey-category">Category</label>
        <select id="hotkey-category" class="form-input form-select"></select>
      </div>
      <div id="conflict-warning" class="conflict-warning" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="conflict-warning-text"></span>
      </div>
      <div class="popover-footer">
        <button id="btn-save-hotkey" class="btn btn-primary">Save</button>
        <button id="btn-clear-hotkey" class="btn btn-danger">Clear Key</button>
      </div>
    </div>
  </div>

<div id="key-tooltip" class="key-tooltip" hidden>
    <div class="kt-label"></div>
    <div class="kt-mods"></div>
    <div class="kt-desc"></div>
    <div class="kt-cat"></div>
  </div>

  <footer class="app-footer">
    <span class="footer-copy">© <span id="footer-year"></span> KeyBindr</span>
    <div class="footer-right">
      <a class="footer-github" href="https://github.com/davidchill/KeyBindr" target="_blank" rel="noopener noreferrer" title="View on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
      <span class="footer-version" id="footer-version"></span>
    </div>
  </footer>

  <!-- Share panel -->
  <div id="share-panel" class="share-panel hidden" role="dialog" aria-label="Share options">
    <button class="share-option" id="share-copy-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span class="share-option-label">
        <span class="share-option-name">Copy Link</span>
        <span class="share-option-hint">Shareable URL with your map</span>
      </span>
    </button>
    <div class="share-divider"></div>
    <button class="share-option" id="share-twitter">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span class="share-option-label">
        <span class="share-option-name">Post on X</span>
      </span>
    </button>
    <button class="share-option" id="share-reddit">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/>
      </svg>
      <span class="share-option-label">
        <span class="share-option-name">Share on Reddit</span>
      </span>
    </button>
    <button class="share-option" id="share-email">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <span class="share-option-label">
        <span class="share-option-name">Share via Email</span>
      </span>
    </button>
    <div class="share-divider"></div>
    <button class="share-option" id="share-copy-md">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="share-option-label">
        <span class="share-option-name">Copy as Markdown</span>
        <span class="share-option-hint">For GitHub, Notion, Obsidian…</span>
      </span>
    </button>
  </div>

  <script src="templates.js"></script>
  <script src="app.js"></script>
</body>
</html>
