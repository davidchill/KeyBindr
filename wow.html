<!DOCTYPE html>
<html lang="en" data-template-id="wow">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World of Warcraft Keyboard Shortcuts — KeyBindr</title>
  <meta name="description" content="Browse World of Warcraft default key bindings on an interactive keyboard map. Movement, abilities, UI panels, and camera controls — free on KeyBindr, no signup required.">
  <meta property="og:title" content="World of Warcraft Keyboard Shortcuts — KeyBindr">
  <meta property="og:description" content="Browse World of Warcraft default key bindings on an interactive keyboard map. Movement, abilities, UI panels, and camera controls — free on KeyBindr, no signup required.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://keybindr.app/wow.html">
  <link rel="canonical" href="https://keybindr.app/wow.html">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y1EQFTC8YR"></script>
  <script src="analytics.js"></script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preload" href="/fonts/chakra-petch-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">

  <script type="module" src="js/template-page.js"></script>
</head>
<body>

  <header class="template-header">
    <a class="template-header-brand" href="https://keybindr.app">
      <img class="brand-icon" src="logos/main_nobackground.png" alt="KeyBindr" aria-hidden="true">
      <span class="brand-name">KeyBindr</span>
    </a>
    <div class="template-header-divider"></div>
    <div class="template-header-info">
      <span id="template-title"></span>
      <span id="template-category"></span>
    </div>
    <button id="template-share-btn" class="btn btn-secondary" style="flex-shrink:0">Share</button>
    <a id="template-cta" class="btn btn-primary template-cta-btn" href="https://keybindr.app">
      Map your own →
    </a>
  </header>

  <p id="template-tab-note" hidden style="margin:6px 20px 0; font-size:0.78rem; color:var(--text-muted);"></p>

  <main class="app-main">
    <div class="legend-section">
      <div class="legend" id="legend">
        <div class="legend-title-row">
          <span class="legend-title">Categories</span>
        </div>
        <div class="legend-mid">
          <div id="category-list" class="category-list"></div>
          <div class="legend-active-preview" id="legend-active-preview"></div>
        </div>
        <span id="stat-assigned" class="legend-stat">0 keys assigned</span>
      </div>
    </div>

    <div class="keyboard-section">
      <div class="keyboard-scale-wrap">
        <div class="keyboard-scroll">
          <div id="keyboard" class="keyboard"></div>
        </div>
      </div>
    </div>

    <div class="summary-section">
      <div class="summary-card">
        <div class="summary-header-row">
          <span class="legend-title">Hotkey Summary</span>
        </div>
        <p id="summary-empty" class="summary-empty">No hotkeys loaded.</p>
        <div id="summary-grid" class="summary-grid"></div>
      </div>
    </div>
  </main>

  <div id="key-tooltip" class="key-tooltip" hidden>
    <div class="kt-label"></div>
    <div class="kt-mods"></div>
    <div class="kt-desc"></div>
    <div class="kt-cat"></div>
  </div>

  <footer class="template-page-footer">
    <span id="footer-version"></span> &nbsp;·&nbsp;
    <a href="https://keybindr.app">KeyBindr</a> — map and share your keyboard shortcuts
  </footer>

  <input id="map-name" type="hidden" value="">

  <div id="share-panel" class="share-panel hidden" role="dialog" aria-label="Share options">
    <button class="share-option" id="share-copy-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="share-option-label"><span class="share-option-name">Copy Link</span><span class="share-option-hint">Shareable URL for this template</span></span>
    </button>
    <button class="share-option" id="share-copy-text">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <span class="share-option-label"><span class="share-option-name">Copy Text</span><span class="share-option-hint">Plain text summary</span></span>
    </button>
    <button class="share-option" id="share-copy-md">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="share-option-label"><span class="share-option-name">Copy as Markdown</span><span class="share-option-hint">For GitHub, Notion, Obsidian…</span></span>
    </button>
    <div class="share-divider"></div>
    <button class="share-option" id="share-twitter">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="share-option-label"><span class="share-option-name">Post on X</span></span>
    </button>
    <button class="share-option" id="share-reddit">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>
      <span class="share-option-label"><span class="share-option-name">Share on Reddit</span></span>
    </button>
    <button class="share-option" id="share-email">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <span class="share-option-label"><span class="share-option-name">Share via Email</span></span>
    </button>
    <div class="share-divider"></div>
    <button class="share-option" id="share-export">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="share-option-label"><span class="share-option-name">Export JSON</span><span class="share-option-hint">Save this template as a file</span></span>
    </button>
    <button class="share-option" id="share-export-png">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span class="share-option-label"><span class="share-option-name">Export PNG</span><span class="share-option-hint">High-res image of this map</span></span>
    </button>
    <button class="share-option" id="share-print">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span class="share-option-label"><span class="share-option-name">Print</span><span class="share-option-hint">Print or save as PDF</span></span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js" crossorigin="anonymous"></script>

</body>
</html>
